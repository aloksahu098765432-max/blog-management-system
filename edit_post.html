<!DOCTYPE html>
<html>
<body>

<h2>Edit Post</h2>

<form method="POST">

<input type="text"
name="title"
value="{{ post[1] }}"
required>

<br><br>

<textarea name="content"
rows="10"
cols="50"
required>{{ post[2] }}</textarea>

<br><br>

<button type="submit">Update Post</button>

</form>

</body>
</html>
